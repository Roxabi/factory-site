<main>
<style>
/* ── 404 forge — scoped styles ─────────────────────────────────────────── */
.forge-404 {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100svh - 64px);
  padding: var(--s-xl) var(--s-md);
  text-align: center;
  gap: var(--s-lg);
}

.forge-404__ember {
  position: relative;
  width: 96px;
  height: 96px;
  flex-shrink: 0;
}

/* Cooled ember core */
.forge-404__ember svg {
  width: 96px;
  height: 96px;
  overflow: visible;
}

.ember-core {
  fill: var(--accent);
  filter: drop-shadow(0 0 12px rgba(232, 93, 4, 0.5));
  transform-origin: 48px 56px;
  animation: ember-pulse 3.2s ease-in-out infinite;
}

.ember-glow {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.5;
  opacity: 0.35;
  rx: 24;
  animation: glow-ring 3.2s ease-in-out infinite;
}

/* Drifting sparks */
.spark {
  fill: var(--accent-hover);
  opacity: 0;
  animation: spark-drift var(--dur, 2.8s) var(--delay, 0s) ease-out infinite;
}

@keyframes ember-pulse {
  0%, 100% { opacity: 0.85; filter: drop-shadow(0 0 10px rgba(232, 93, 4, 0.45)); }
  50%       { opacity: 1;    filter: drop-shadow(0 0 22px rgba(249, 115, 22, 0.65)); }
}

@keyframes glow-ring {
  0%, 100% { opacity: 0.2; r: 40; }
  50%       { opacity: 0.5; r: 46; }
}

@keyframes spark-drift {
  0%   { opacity: 0;    transform: translate(0, 0) scale(1); }
  20%  { opacity: 0.9; }
  100% { opacity: 0;    transform: translate(var(--dx, 6px), calc(var(--dy, -32px))) scale(0.3); }
}

@media (prefers-reduced-motion: reduce) {
  .ember-core, .ember-glow, .spark { animation: none !important; }
  .ember-core { opacity: 1; }
  .ember-glow { opacity: 0.3; }
}

/* ── Typography ── */
.forge-404__code {
  font-family: var(--font-display);
  font-size: clamp(4.5rem, 18vw, 8rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--text);
}

.forge-404__heading {
  font-family: var(--font-head);
  font-size: clamp(1.25rem, 4vw, 1.75rem);
  font-weight: 700;
  color: var(--text);
  margin: 0;
}

.forge-404__body {
  font-size: 1rem;
  color: var(--text-muted);  /* #9ca3af dark / #57534e light — both AA */
  max-width: 34ch;
  margin: 0 auto;
  line-height: 1.6;
}

.forge-404__action {
  margin-top: var(--s-sm);
}

/* ── Divider line ── */
.forge-404__divider {
  width: 48px;
  height: 2px;
  background: var(--accent);
  border-radius: var(--r-full);
  opacity: 0.6;
}
</style>

<section class="forge-404" aria-labelledby="err-heading">

  <!-- Ember SVG with CSS animations + sparks -->
  <div class="forge-404__ember" aria-hidden="true">
    <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
      <!-- glow ring -->
      <ellipse class="ember-glow" cx="48" cy="60" rx="40" ry="14"/>
      <!-- cooled ember teardrop -->
      <path class="ember-core"
        d="M48 16 C48 16 24 42 24 58 C24 71.3 34.7 82 48 82 C61.3 82 72 71.3 72 58 C72 42 48 16 48 16 Z"/>
      <!-- sparks: cx/cy = base position, animated by CSS -->
      <circle class="spark" cx="48" cy="20" r="2.5"
        style="--dur:2.6s;--delay:0s;--dx:-10px;--dy:-28px"/>
      <circle class="spark" cx="48" cy="20" r="1.8"
        style="--dur:3.1s;--delay:0.7s;--dx:12px;--dy:-34px"/>
      <circle class="spark" cx="48" cy="20" r="2"
        style="--dur:2.4s;--delay:1.3s;--dx:4px;--dy:-26px"/>
      <circle class="spark" cx="48" cy="20" r="1.5"
        style="--dur:3.4s;--delay:0.4s;--dx:-6px;--dy:-38px"/>
    </svg>
  </div>

  <div class="forge-404__code" aria-hidden="true">404</div>

  <div class="forge-404__divider" aria-hidden="true"></div>

  <h1 class="forge-404__heading" id="err-heading">Cette page n'est jamais sortie de la forge.</h1>

  <p class="forge-404__body">Le chemin que tu as suivi ne mene nulle part. La forge ne garde pas les travaux inacheves.</p>

  <p class="forge-404__action">
    <a href="/fr/" class="btn btn-primary">Aller sur le plancher de la Factory</a>
  </p>

</section>
</main>
