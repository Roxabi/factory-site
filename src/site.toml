# ── Pages. `path` is lang-agnostic and lang-prefix-free ("" = site root). ─────
# `active` highlights a nav item. `jsonld` selects the structured-data builder.

[[page]]
id          = "home"
path        = ""
body        = "home"
og_type     = "website"
footer      = "full"
shader      = "ember-forge"
active      = ""
jsonld      = "home"
og_alt      = true
changefreq  = "weekly"
priority    = "1.0"
  [page.en]
  title    = "Roxabi Factory — Agent engine. Jobs layer. Your hardware."
  desc     = "Roxabi Factory is a self-hostable agent engine — hexagonal core, hub-and-spoke over NATS, a jobs layer that orchestrates capability workers into a fleet. Raw in, crafted out. No lock-in."
